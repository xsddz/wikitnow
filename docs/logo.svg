<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景 -->
  <rect width="120" height="120" rx="24" fill="#EDE9FE"/>

  <defs>
    <linearGradient id="frontGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </linearGradient>
  </defs>

  <!-- 后页（最左，最暗） -->
  <g transform="rotate(-22, 60, 84)">
    <rect x="43" y="30" width="34" height="54" rx="5" fill="#8B5CF6" opacity="0.40"/>
  </g>

  <!-- 中页 -->
  <g transform="rotate(0, 60, 84)">
    <rect x="43" y="30" width="34" height="54" rx="5" fill="#6366F1" opacity="0.70"/>
  </g>

  <!-- 前页（最右，最亮，带内容线） -->
  <g transform="rotate(22, 60, 84)">
    <rect x="43" y="30" width="34" height="54" rx="5" fill="url(#frontGrad)"/>
    <line x1="50" y1="46" x2="70" y2="46" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="56" x2="67" y2="56" stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.75"/>
    <line x1="50" y1="66" x2="70" y2="66" stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.75"/>
    <line x1="50" y1="76" x2="62" y2="76" stroke="white" stroke-width="2"   stroke-linecap="round" opacity="0.50"/>
  </g>
</svg>
