<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="60" cy="60" r="55" fill="url(#grad1)"/>

  <!-- Document body with folded top-right corner -->
  <path d="M26 42 L64 42 L76 54 L76 90 L26 90 Z" fill="white" opacity="0.95"/>
  <!-- Fold flap shadow -->
  <path d="M64 42 L76 54 L64 54 Z" fill="#c7d2fe" opacity="0.75"/>

  <!-- Text lines inside document -->
  <line x1="34" y1="63" x2="68" y2="63" stroke="#4338ca" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="34" y1="72" x2="68" y2="72" stroke="#4338ca" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
  <line x1="34" y1="81" x2="52" y2="81" stroke="#4338ca" stroke-width="3" stroke-linecap="round" opacity="0.4"/>

  <!-- Accent badge: upload-now dot (top right, overlaps doc corner) -->
  <circle cx="80" cy="34" r="13" fill="#f97316"/>
  <!-- Up arrow inside badge -->
  <line x1="80" y1="27" x2="80" y2="39" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <polyline points="74,34 80,26 86,34" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
